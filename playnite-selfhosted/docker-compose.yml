version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: playnite-postgres
    environment:
      POSTGRES_USER: playnite_user
      POSTGRES_PASSWORD: playnite_password
      POSTGRES_DB: playnite_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: playnite-minio
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    ports:
      - "9000:9000"  # API Port
      - "9001:9001"  # Console GUI Port
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
