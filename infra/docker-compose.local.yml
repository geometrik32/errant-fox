# Local development override — run with:
# docker compose -f infra/docker-compose.yml -f infra/docker-compose.local.yml up --build
#
# Removes Traefik proxy network dependency and exposes ports directly.

services:
  backend:
    environment:
      SEAFILE_URL: https://seafile.aat-terra.ru
      FRONTEND_ORIGIN: http://localhost:8081
    networks:
      - default

  frontend:
    ports:
      - "8081:80"
    labels: []
    networks:
      - default

networks:
  proxy:
    external: false
    name: errantfox_proxy_local
